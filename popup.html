<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Tab Lifecycle Timer</title>
  <script>
    (function () {
      try {
        var themePreference = localStorage.getItem('theme');
        var resolvedTheme = themePreference === 'gachi'
          ? 'gachi'
          : themePreference === 'dark'
          || (themePreference !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          ? 'dark'
          : 'light';
        document.documentElement.setAttribute('data-theme', resolvedTheme);
      } catch (e) {}
    })();
  </script>
  <style>
    :root {
      --bg-body: #ffffff;
      --color-text: #222222;
      --color-h3: #222222;
      --bg-master-switch: #f1f3f4;
      --bg-master-switch-paused: #fce8e6;
      --color-master-switch-paused: #c5221f;
      --bg-stat-box: #f1f3f4;
      --color-stat-box: #5f6368;
      --color-stat-strong: #1a73e8;
      --bg-tab-protect: #e8f0fe;
      --color-tab-protect: #1967d2;
      --bg-slider: #dadce0;
      --bg-slider-checked: #1a73e8;
      --bg-slider-knob: #ffffff;
      --bg-button: #1a73e8;
      --bg-button-hover: #1557b0;
      --color-button-text: #ffffff;
    }
    :root[data-theme="dark"] {
      --bg-body: #1e1e1e;
      --color-text: #e8eaed;
      --color-h3: #e8eaed;
      --bg-master-switch: #3c4043;
      --bg-master-switch-paused: #5c1d1b;
      --color-master-switch-paused: #f28b82;
      --bg-stat-box: #3c4043;
      --color-stat-box: #e8eaed;
      --color-stat-strong: #8ab4f8;
      --bg-tab-protect: #174ea6;
      --color-tab-protect: #8ab4f8;
      --bg-slider: #5f6368;
      --bg-slider-checked: #8ab4f8;
      --bg-slider-knob: #e8eaed;
      --bg-button: #8ab4f8;
      --bg-button-hover: #aecbfa;
      --color-button-text: #202124;
    }
    :root[data-theme="gachi"] {
      --bg-body: #08070c;
      --color-text: #fff7ff;
      --color-h3: #c9a7ff;
      --bg-master-switch: rgba(255,255,255,0.08);
      --bg-master-switch-paused: rgba(92, 29, 27, 0.78);
      --color-master-switch-paused: #ffc8bf;
      --bg-stat-box: rgba(255,255,255,0.07);
      --color-stat-box: #f4ebff;
      --color-stat-strong: #c9a7ff;
      --bg-tab-protect: rgba(201, 167, 255, 0.1);
      --color-tab-protect: #e9dcff;
      --bg-slider: rgba(255,255,255,0.25);
      --bg-slider-checked: #c9a7ff;
      --bg-slider-knob: #ffffff;
      --bg-button: linear-gradient(135deg, #c9a7ff, #7b61ff);
      --bg-button-hover: linear-gradient(135deg, #d9c0ff, #9a88ff);
      --color-button-text: #ffffff;
    }
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      padding: 14px;
      margin: 0;
      background-color: var(--bg-body);
      color: var(--color-text);
      transition: background-color 0.2s, color 0.2s;
      position: relative;
      overflow: hidden;
    }
    .theme-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -3;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      background: #000;
    }
    .theme-overlay {
      position: absolute;
      inset: 0;
      z-index: -2;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.68), rgba(21, 7, 31, 0.78));
    }
    :root[data-theme="gachi"] .theme-video,
    :root[data-theme="gachi"] .theme-overlay {
      opacity: 1;
    }
    h3 { margin: 0 0 10px 0; font-size: 15px; color: var(--color-h3); transition: color 0.2s; }
    
    /* Главный выключатель таймера */
    .master-switch-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      background-color: var(--bg-master-switch);
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
      font-weight: bold;
      transition: background-color 0.2s, color 0.2s;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(14px) saturate(120%);
      -webkit-backdrop-filter: blur(14px) saturate(120%);
    }
    .master-switch-box.paused {
      background-color: var(--bg-master-switch-paused);
      color: var(--color-master-switch-paused);
    }

    .stat-box {
      background-color: var(--bg-stat-box);
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      color: var(--color-stat-box);
      margin-bottom: 12px;
      transition: background-color 0.2s, color 0.2s;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(14px) saturate(120%);
      -webkit-backdrop-filter: blur(14px) saturate(120%);
    }
    .stat-box strong { color: var(--color-stat-strong); transition: color 0.2s; }
    
    .tab-protect-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px;
      background-color: var(--bg-tab-protect);
      border-radius: 6px;
      font-size: 12px;
      color: var(--color-tab-protect);
      margin-bottom: 12px;
      font-weight: 500;
      transition: background-color 0.2s, color 0.2s;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(14px) saturate(120%);
      -webkit-backdrop-filter: blur(14px) saturate(120%);
    }
    
    /* Общие стили Toggle Switches */
    .switch { position: relative; display: inline-block; width: 34px; height: 20px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--bg-slider); transition: .2s; border-radius: 20px;
    }
    .slider:before {
      position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
      background-color: var(--bg-slider-knob); transition: .2s; border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--bg-slider-checked); }
    input:checked + .slider.master-slider { background-color: #1e8e3e; }
    :root[data-theme="dark"] input:checked + .slider.master-slider { background-color: #81c995; }
    input:checked + .slider:before { transform: translateX(14px); }

    button {
      width: 100%;
      padding: 8px;
      background: var(--bg-button);
      color: var(--color-button-text);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      font-size: 13px;
      transition: background 0.2s, color 0.2s, transform 0.2s;
      position: relative;
      z-index: 1;
    }
    button:hover { background: var(--bg-button-hover); }
    :root[data-theme="gachi"] button:hover { transform: translateY(-1px); }
  </style>
</head>
<body>
  <video id="themeVideo" class="theme-video" muted loop playsinline preload="none"></video>
  <div class="theme-overlay"></div>

  <h3 data-i18n="popupTitle">Tab Lifecycle Timer</h3>
  
  <div id="masterBox" class="master-switch-box">
    <span id="masterStatusText">Таймер работает</span>
    <label class="switch">
      <input type="checkbox" id="pauseTimerCheckbox" checked>
      <span class="slider master-slider"></span>
    </label>
  </div>

  <div class="stat-box">
    <span data-i18n="currentTimeoutLabel">Текущий таймаут:</span> <strong id="currentTimeout">-</strong> <span data-i18n="timeoutUnit">min.</span><br>
    <span data-i18n="savedMemoryLabel">Сберегли памяти:</span> <strong id="ramCounter">0</strong>
  </div>

  <div class="tab-protect-box">
    <span data-i18n="ignoreCurrentTab">Игнорировать эту вкладку</span>
    <label class="switch">
      <input type="checkbox" id="protectTabCheckbox">
      <span class="slider"></span>
    </label>
  </div>

  <button id="openDashboardBtn" data-i18n="openDashboard">Панель управления</button>

  <script src="logic.js"></script>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
